<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 23 - Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Calculadora de IMC</h1>
    <p>Introduce tu peso y estatura:</p>

    <div class="formulario">
        <label>Peso (kg):</label>
        <input type="number" id="peso" step="0.1" placeholder="Ej: 60">

        <label>Estatura (m):</label>
        <input type="number" id="estatura" step="0.01" placeholder="Ej: 1.65">

        <div class="botones">
            <button onclick="calcularIMC()">Calcular IMC</button>
        </div>
    </div>

    <div id="resultado"></div>

    <script src="script.js"></script>
</body>
</html>
